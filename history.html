        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                       href="index.html">

                <li class="nav-item">

<li class="nav-item">

<div class="container py-4">

    <h2 class="mb-4">
        📜 Match History
    </h2>

    <div id="historyContainer"></div>

</div>

<script src="assets/js/history.js"></script>
<div
    class="modal fade"
    id="editMatchModal"
    tabindex="-1">


<div class="modal-dialog">

  <div class="modal-content stat-card text-white">

      <div class="modal-header border-secondary">

            <h5 class="modal-title">
                ✏️ Edit Match
            </h5>

            <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal">
            </button>

        </div>

        <div class="modal-body">

            <label class="form-label fw-bold text-white">
    🏸 Team A Score
</label>

            <input
                type="number"
                id="editScoreA"
                class="form-control mb-3">

           <label class="form-label fw-bold text-white">
    🏸 Team B Score
</label>

            <input
                type="number"
                id="editScoreB"
                class="form-control">

        </div>

       <div class="modal-footer border-secondary">

            <button
                class="btn btn-secondary"
                data-bs-dismiss="modal">

                Cancel

            </button>

            <button
                class="btn btn-primary"
                onclick="saveEditedMatch()">

                Save

            </button>

        </div>

    </div>

</div>


</div>
