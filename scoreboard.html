<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Match</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#08142f">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top custom-navbar">
    <div class="container">

        <a class="navbar-brand fw-bold" href="index.html">
            🏸 ShuttleScore
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="index.html">
                        🏠 Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="players.html">
                        👥 Players
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="match.html">
                        🏸 New Match
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="history.html">
                        📜 History
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="leaderboard.html">
                        🏆 Rankings
                    </a>
                </li>
<li class="nav-item">
    <a class="nav-link"
       href="settings.html">
       ⚙ Settings
    </a>
</li>
            </ul>

        </div>

    </div>
</nav>
<div class="container py-4">

    <h2 class="text-center mb-4">
        🏸 Live Match
    </h2>

    <div class="row g-3">

        <!-- Team A -->
        <div class="col-md-6">

            <div class="card stat-card text-center">

                <div class="card-body">

                    <h4 id="teamA"></h4>

                    <div class="score" id="scoreA">
                        0
                    </div>

                    <button
                        class="btn btn-success btn-lg w-100"
                        onclick="addPointA()">
                        +1 Point
                    </button>

                </div>

            </div>

        </div>

        <!-- Team B -->
        <div class="col-md-6">

            <div class="card stat-card text-center">

                <div class="card-body">

                    <h4 id="teamB"></h4>

                    <div class="score" id="scoreB">
                        0
                    </div>

                    <button
                        class="btn btn-success btn-lg w-100"
                        onclick="addPointB()">
                        +1 Point
                    </button>

                </div>

            </div>

        </div>

    </div>

    <div class="row mt-4">

        <div class="col-6">
            <button
                class="btn btn-warning w-100"
                onclick="undoPoint()">
                Undo
            </button>
        </div>

        <div class="col-6">
            <button
                class="btn btn-danger w-100"
                onclick="finishMatch()">
                End Match
            </button>
        </div>

    </div>

</div>

<script src="assets/js/scoreboard.js"></script>

</body>
</html>
