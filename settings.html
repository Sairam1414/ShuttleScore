<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings - ShuttleScore</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#08142f">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
    <div class="container">


    <a class="navbar-brand fw-bold" href="index.html">
        🏸 ShuttleScore
    </a>

    <button class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

        <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse"
         id="navbarNav">

        <ul class="navbar-nav ms-auto">

            <li class="nav-item">
                <a class="nav-link" href="index.html">
                    🏠 Home
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="players.html">
                    👥 Players
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="match.html">
                    🏸 Match
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="history.html">
                    📜 History
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="leaderboard.html">
                    🏆 Rankings
                </a>
            </li>

        </ul>

    </div>

</div>


</nav>

<div class="container py-4">


<h2 class="mb-4">
    ⚙ Settings
</h2>

<div class="card stat-card">

    <div class="card-body">

        <label class="form-label">
            Default Match Type
        </label>

        <select
            id="matchType"
            class="form-select mb-3">

            <option value="singles">
                Singles
            </option>

            <option value="doubles">
                Doubles
            </option>

        </select>

        <label class="form-label">
            Winning Score
        </label>

        <select
            id="winningScore"
            class="form-select mb-3">

            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="21">21</option>

        </select>

        <label class="form-label mt-3">
            Custom Winning Score
        </label>

        <input
            type="number"
            id="customScore"
            class="form-control mb-3"
            placeholder="Leave empty to use dropdown">

        <label class="form-label">
            Win By
        </label>

        <select
            id="winBy"
            class="form-select mb-3">

            <option value="1">
                1 Point
            </option>

            <option value="2">
                2 Points
            </option>

        </select>

        <button
            class="btn btn-success w-100"
            onclick="saveSettings()">

            Save Settings

        </button>
<button
    class="btn btn-primary w-100 mt-3"
    onclick="exportData()">

    📤 Export Backup

</button>

<button
    class="btn btn-secondary w-100 mt-2"
    onclick="document.getElementById('importFile').click()">

    📥 Import Backup

</button>

<input
    type="file"
    id="importFile"
    accept=".json"
    hidden
    onchange="importData(event)">
    </div>

</div>


</div>

<script src="assets/js/settings.js"></script>

</body>
</html>
