<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Match</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#08142f">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top custom-navbar">

    <div class="container">

        <a class="navbar-brand fw-bold" href="index.html">
            🏸 ShuttleScore
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div
            class="collapse navbar-collapse"
            id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">
                        🏠 Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="players.html">
                        👥 Players
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="match.html">
                        🏸 New Match
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="history.html">
                        📜 History
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="leaderboard.html">
                        🏆 Rankings
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="settings.html">
                        ⚙️ Settings
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container py-4">

    <!-- Match Type -->

    <!-- Page Title -->

   <h2 class="fw-bold text-center mb-4">
    🏸 Create Match
</h2>
    <!-- Player Selection -->


<div class="card stat-card">

    <div class="card-body">

        <label class="form-label fw-bold">
            Match Type
        </label>

        <select
            id="matchType"
            class="form-select mb-3">

            <option value="doubles">
                Doubles
            </option>

            <option value="singles">
                Singles
            </option>

        </select>

        <label class="form-label fw-bold">
            Winning Score
        </label>

        <select
            id="winningScore"
            class="form-select mb-4">

            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="21" selected>21</option>

        </select>

        <h5
            class="mb-3"
            id="selectionTitle">

            Select 4 Players

        </h5>

        <div
            id="playersContainer"
            class="row g-3">
        </div>

        <button
            class="btn btn-primary mt-4 w-100"
            onclick="startMatch()">

            Start Match

        </button>

        <div class="text-center mt-2">

            <a
                href="players.html"
                class="btn btn-sm btn-outline-light">

                ➕ Add Player

            </a>

        </div>

    </div>

</div>

<script src="assets/js/match.js"></script>

</body>
</html>
